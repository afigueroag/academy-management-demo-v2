function panelAssignCats(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  const assigned=api._studentCats(userId);
  const cats=db.categories;
  openPanel(`<div class="panel-hdr"><span class="panel-title">Categorías de ${esc(u.first_name)}</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body"><p class="text-sm text-muted mb-4" style="margin-bottom:16px">Las categorías determinan qué clases puede ver e inscribir este estudiante.</p>
    <form id="cats-form">
      ${cats.map(c=>`<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer"><input type="checkbox" name="cat" value="${c.id}"${assigned.includes(c.id)?' checked':''}> ${chip(c.name,c.color)} <div><div style="font-weight:600">${esc(c.name)}</div><div class="text-xs text-muted">${fmt(c.monthly_fee)}/mes · Matrícula: ${fmt(c.enrollment_fee)}</div></div></label>`).join('')}
      <div class="fc-actions"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="submit" class="btn btn-primary">Asignar</button></div>
    </form></div>`);
  document.getElementById('cats-form').onsubmit=e=>{
    e.preventDefault();
    const selected=Array.from(e.target.querySelectorAll('input[name="cat"]:checked')).map(x=>x.value);
    api.assignUserCategories(userId,selected);
    closePanel();showToast('Categorías asignadas','success');renderPage();
  };
}

function panelAttendance(classId){
  const cls=db.classes.find(c=>c.id===classId);if(!cls)return;
  const enrolled=db.enrollments.filter(e=>e.class_id===classId&&e.status==='active');
  const rows=enrolled.map(e=>{
    const s=db.users.find(u=>u.id===e.student_id)||{};
    return`<div class="att-row"><div class="att-name">${esc(s.first_name)} ${esc(s.last_name)}</div><div class="att-opts"><div class="att-opt present sel" data-val="present" data-sid="${s.id}">P</div><div class="att-opt absent" data-val="absent" data-sid="${s.id}">A</div><div class="att-opt excused" data-val="excused" data-sid="${s.id}">J</div></div></div>`;
  }).join('');
  openPanel(`<div class="panel-hdr"><span class="panel-title">Asistencia – ${esc(cls.name)}</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body">
      <div class="fg"><label>Fecha de sesión</label><input class="fc" type="date" id="att-date" value="${today()}"></div>
      <div id="att-rows">${rows||'<p class="text-muted text-sm">Sin estudiantes inscritos.</p>'}</div>
      <div class="fc-actions" style="margin-top:12px"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="button" class="btn btn-primary" id="att-submit">Guardar asistencia</button></div>
    </div>`);
  // toggle switches
  document.getElementById('panel-drawer').querySelectorAll('.att-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const parent=btn.closest('.att-opts');
      parent.querySelectorAll('.att-opt').forEach(b=>{b.classList.remove('sel');});
      btn.classList.add('sel');
    });
  });
  document.getElementById('att-submit').onclick=()=>{
    const date=document.getElementById('att-date').value;
    const records=[];
    document.getElementById('panel-drawer').querySelectorAll('.att-row').forEach(row=>{
      const sel=row.querySelector('.att-opt.sel');if(!sel)return;
      records.push({student_id:sel.dataset.sid,status:sel.dataset.val});
    });
    api.recordAttendance(classId,date,records);
    closePanel();showToast(`Asistencia registrada para ${records.length} estudiantes`,'success');renderPage();
  };
}

function panelPayroll(userId){
  const insts=db.users.filter(u=>u.role==='instructor'&&u.is_active);
  const mo=monthStr(0);
  openPanel(`<div class="panel-hdr"><span class="panel-title">Registrar pago de nómina</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body"><form id="payroll-form">
      <div class="fg"><label>Instructor</label><select class="fc" name="recipient_id" required>${insts.map(i=>{const ua=db.user_academies.find(x=>x.user_id===i.id);const h=api._instructorHours(i.id,`${mo}-01`,today());return`<option value="${i.id}"${i.id===userId?' selected':''}>${esc(i.first_name)} ${esc(i.last_name)} (${h.toFixed(1)}h est. ${fmt(h*(ua?.hourly_rate||0))})</option>`;}).join('')}</select></div>
      <div class="fc-row">
        <div class="fg"><label>Período inicio</label><input class="fc" type="date" name="period_start" value="${mo}-01"></div>
        <div class="fg"><label>Período fin</label><input class="fc" type="date" name="period_end" value="${mo}-30"></div>
      </div>
      <div class="fg"><label>Monto (MXN)</label><input class="fc" type="number" name="amount" step="0.01" required></div>
      <div class="fg"><label>Método de pago</label><select class="fc" name="method"><option value="transfer">Transferencia</option><option value="cash">Efectivo</option><option value="check">Cheque</option></select></div>
      <div class="fg"><label>Notas</label><textarea class="fc" name="notes" rows="2"></textarea></div>
      <div class="fc-actions"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="submit" class="btn btn-primary">Registrar pago</button></div>
    </form></div>`);
  document.getElementById('payroll-form').onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    api.createPayroll(fd.get('recipient_id'),fd.get('amount'),fd.get('method'),fd.get('period_start'),fd.get('period_end'),fd.get('notes'));
    closePanel();showToast('Pago de nómina registrado','success');renderPage();
  };
}

function panelCreateExpense(){
  openPanel(`<div class="panel-hdr"><span class="panel-title">Registrar gasto</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body"><form id="expense-form">
      <div class="fg"><label>Categoría</label><select class="fc" name="subcategory"><option value="rent">Renta</option><option value="utilities">Servicios</option><option value="marketing">Marketing</option><option value="maintenance">Mantenimiento</option><option value="equipment">Equipamiento</option><option value="other">Otro</option></select></div>
      <div class="fg"><label>Monto (MXN)</label><input class="fc" type="number" name="amount" step="0.01" required></div>
      <div class="fg"><label>Método</label><select class="fc" name="method"><option value="transfer">Transferencia</option><option value="cash">Efectivo</option><option value="check">Cheque</option></select></div>
      <div class="fg"><label>Notas</label><textarea class="fc" name="notes" rows="2" placeholder="Descripción del gasto…"></textarea></div>
      <div class="fc-actions"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="submit" class="btn btn-primary">Registrar</button></div>
    </form></div>`);
  document.getElementById('expense-form').onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    api.createExpense(fd.get('subcategory'),fd.get('amount'),fd.get('method'),fd.get('notes'));
    closePanel();showToast('Gasto registrado','success');renderPage();

}

function panelCreateStudent(){
  openPanel(`<div class="panel-hdr"><span class="panel-title">Nuevo estudiante</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body"><form id="student-form">
      <div class="fc-row"><div class="fg"><label>Nombre</label><input class="fc" name="first_name" required></div><div class="fg"><label>Apellido</label><input class="fc" name="last_name" required></div></div>
      <div class="fg"><label>Correo electrónico</label><input class="fc" type="email" name="email" required></div>
      <div class="fg"><label>Teléfono</label><input class="fc" name="phone"></div>
      <div class="fc-actions"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="submit" class="btn btn-primary">Crear estudiante</button></div>
    </form></div>`);
  document.getElementById('student-form').onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    api.createUser({first_name:fd.get('first_name'),last_name:fd.get('last_name'),email:fd.get('email'),phone:fd.get('phone'),role:'student'});
    closePanel();showToast('Estudiante creado','success');renderPage();

function panelWaitlist(classId){
  const{waiting_list,total_waiting}=api.getClassWaitingList(classId);
  const cls=db.classes.find(c=>c.id===classId)||{};
  const rows=waiting_list.map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:24px;height:24px;background:var(--accent-l);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${e.waiting_position}</div><div style="flex:1"><div style="font-weight:600">${esc(e.student_name)}</div><div class="text-xs text-muted">En espera desde ${fmtDate(e.waitlisted_at?.slice(0,10)||'')}</div></div><button class="btn btn-danger btn-sm" data-action="cancel-enroll" data-enroll-id="${e.id}">Quitar</button></div>`).join('');
  openPanel(`<div class="panel-hdr"><span class="panel-title">Lista de espera – ${esc(cls.name)}</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body"><div class="sc-label">${total_waiting} estudiante${total_waiting!==1?'s':''} en espera</div><div style="margin-top:12px">${rows||'<p class="text-muted text-sm">Sin estudiantes en lista de espera.</p>'}</div></div>`);
}

function panelStudentDetail(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  const enrolments=db.enrollments.filter(e=>e.student_id===userId&&e.status!=='cancelled');
  const txns=db.transactions.filter(t=>t.student_id===userId).slice(0,8);
  const cats=api._studentCats(userId).map(id=>db.categories.find(c=>c.id===id)).filter(Boolean);
  const att=db.attendance.filter(a=>a.user_id===userId);
  const attR=att.length?Math.round(att.filter(a=>a.status==='present').length/att.length*100):0;
  const debt=txns.filter(t=>t.type==='income'&&t.status==='pending').reduce((s,t)=>s+t.amount,0);
  openPanel(`<div class="panel-hdr"><span class="panel-title">${esc(u.first_name)} ${esc(u.last_name)}</span><button class="panel-close" data-action="close-panel">✕</button></div>
    <div class="panel-body">
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div class="h-avatar" style="width:48px;height:48px;font-size:18px">${u.first_name[0]}${(u.last_name||'')[0]||''}</div>
        <div><div style="font-weight:600">${esc(u.first_name)} ${esc(u.last_name)}</div><div class="text-sm text-muted">${esc(u.email)}</div><div class="text-sm text-muted">${esc(u.phone||'')}</div></div>
      </div>
      <div class="grid-2 gap-3 mb-4" style="gap:10px;margin-bottom:14px">${[['Asistencia',`${attR}%`],['Deuda',fmt(debt)]].map(([l,v])=>`<div class="scorecard" style="padding:12px"><div class="sc-label">${l}</div><div style="font-size:18px;font-weight:700">${v}</div></div>`).join('')}</div>
      <div style="margin-bottom:12px"><div class="sc-label" style="margin-bottom:6px">Categorías</div>${cats.map(c=>chip(c.name,c.color)).join(' ')||'<span class="text-muted text-sm">Sin categorías</span>'}</div>
      <div style="margin-bottom:12px"><div class="sc-label" style="margin-bottom:6px">Inscripciones activas</div>${enrolments.map(e=>{const cls=db.classes.find(c=>c.id===e.class_id)||{};return`<div class="text-sm" style="padding:5px 0;border-bottom:1px solid var(--border)">${esc(cls.name||'—')} – ${badge(e.status)}</div>`;}).join('')||'<span class="text-muted text-sm">Sin inscripciones</span>'}</div>
      <div class="fc-actions"><button class="btn btn-primary" data-action="open-cash-payment" data-enroll-id="${enrolments[0]?.id||''}">Registrar pago</button>${S.role==='admin'?`<button class="btn btn-ghost" data-action="open-assign-cats" data-user-id="${userId}">Asignar cats</button>`:''}</div>
    </div>`);
}

/* ═══════════════════════════════════════════════════════════
   EVENTS + INIT
═══════════════════════════════════════════════════════════ */
/* ── GLOBAL CLICK HANDLER ── */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');
  if(!t)return;
  e.preventDefault();
  const{action,...d}=t.dataset;
  switch(action){
    case 'navigate': navigate(d.route);break;
    case 'login': S.role='admin';S.userId=ROLE_USERS.admin;document.getElementById('role-select').value='admin';navigate('/profile');showToast('Sesión iniciada como Admin','success');break;
    case 'reset-demo': resetDemo();break;
    case 'close-panel': closePanel();break;
    case 'close-modal': closeModal();break;
    case 'open-cash-payment': panelCashPayment(d.enrollId||'');break;
    case 'open-stripe-payment': panelStripePayment(d.enrollId);break;
    case 'open-enroll-student': panelEnrollStudent(d.classId);break;
    case 'open-create-class': panelEditClass(null);break;
    case 'open-edit-class': panelEditClass(d.classId);break;
    case 'open-create-cat': panelEditCat(null);break;
    case 'open-edit-cat': panelEditCat(d.catId);break;
    case 'open-assign-cats': panelAssignCats(d.userId);break;
    case 'open-attendance': panelAttendance(d.classId);break;
    case 'open-payroll': panelPayroll(d.userId||'');break;
    case 'open-create-expense': panelCreateExpense();break;
    case 'open-create-student': panelCreateStudent();break;
    case 'open-invite-student': showToast('Invitación enviada por correo (simulado)','success');break;
    case 'open-waitlist': panelWaitlist(d.classId);break;
    case 'open-student-detail': panelStudentDetail(d.userId);break;
    case 'open-edit-student':{const u=db.users.find(x=>x.id===d.userId);if(u)openPanel(`<div class="panel-hdr"><span class="panel-title">Editar – ${esc(u.first_name)}</span><button class="panel-close" data-action="close-panel">✕</button></div><div class="panel-body"><form id="edit-user-form"><div class="fc-row"><div class="fg"><label>Nombre</label><input class="fc" name="first_name" value="${esc(u.first_name)}" required></div><div class="fg"><label>Apellido</label><input class="fc" name="last_name" value="${esc(u.last_name)}" required></div></div><div class="fg"><label>Teléfono</label><input class="fc" name="phone" value="${esc(u.phone||'')}"></div><div class="fc-actions"><button type="button" class="btn btn-secondary" data-action="close-panel">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></div>`);document.getElementById('edit-user-form')?.addEventListener('submit',ev=>{ev.preventDefault();const fd=new FormData(ev.target);api.updateUser(d.userId,{first_name:fd.get('first_name'),last_name:fd.get('last_name'),phone:fd.get('phone')});closePanel();showToast('Estudiante actualizado','success');renderPage();});break;}
    case 'enroll-student-self':{const res=api.createEnrollment(S.userId,d.classId);if(res.error)showToast(res.message,'error');else{showToast(res.message,'success');renderPage();}break;}
    case 'confirm-cancel-enroll':{if(confirm('¿Cancelar esta inscripción?')){api.deleteEnrollment(d.enrollId);renderPage();}break;}
    case 'cancel-enroll':{api.deleteEnrollment(d.enrollId);closePanel();renderPage();break;}
    case 'delete-cat':{const c=api._cat(d.catId);const clsCount=db.class_categories.filter(x=>x.category_id===d.catId).length;const stuCount=db.student_categories.filter(x=>x.category_id===d.catId).length;if(confirm(`Eliminar "${c?.name}"?\n${clsCount} clases y ${stuCount} estudiantes asociados serán desvinculados.`)){api.deleteCategory(d.catId);showToast('Categoría eliminada','success');renderPage();}break;}
    case 'save-profile': showToast('Perfil actualizado','success');break;
    case 'save-academy': showToast('Academia actualizada','success');break;
    case 'stripe-confirm':{
      const piId=t.dataset.pi;const enrollId=t.dataset.enroll;
      t.textContent='Procesando…';t.disabled=true;
      setTimeout(()=>{
        const res=api.confirmPayment(piId,enrollId);
        closeModal();
        if(res.error){showToast('Pago fallido','error');return;}
        showToast('¡Pago exitoso! Factura generada.','success');renderPage();
      },1200);
      break;}
    case '': break;
  }
});

/* ── ROLE SELECTOR ── */
document.getElementById('role-select').addEventListener('change',e=>{
  S.role=e.target.value;
  S.userId=ROLE_USERS[S.role];
  // redirect to valid route for role
  const adminRoutes=['/students','/instructors','/categories','/sales','/dashboard','/dashboard/ingresos','/dashboard/gastos','/dashboard/pl','/dashboard/nomina'];
  if((S.role==='student'||S.role==='instructor')&&adminRoutes.includes(S.route))S.route='/profile';
  if(S.role==='receptionist'&&['/categories','/dashboard','/dashboard/ingresos','/dashboard/gastos','/dashboard/pl','/dashboard/nomina'].includes(S.route))S.route='/profile';
  navigate(S.route);
  showToast(`Vista cambiada a ${({admin:'Admin',receptionist:'Recepcionista',instructor:'Instructor',student:'Estudiante'})[S.role]}`,'success');
});

/* ── INIT ── */
function init(){
  loadDb();
  S.route=location.hash.slice(1)||'/profile';
  renderAll();
  window.addEventListener('hashchange',()=>{
    const r=location.hash.slice(1)||'/profile';
    if(r!==S.route){S.route=r;renderShell();renderPage();}
  });
}
init();

</script>
